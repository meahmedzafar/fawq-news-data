name: Automated News Scraper

# This tells GitHub WHEN to run the script
on:
  schedule:
    # This is the CRON code for "every 30 minutes"
    - cron: '*/30 * * * *'
  # This allows you to also trigger it manually by clicking a button in GitHub
  workflow_dispatch:

# This tells GitHub WHAT to do
jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    # We need to give the server permission to save the new JSON file
    permissions:
      contents: write

    steps:
      # 1. Grab your repository's files
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up the Python environment
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install the free libraries you listed in requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run your scraper script
      - name: Run Scraper
        run: python scraper.py

      # 5. Save the generated news.json back to the repository
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add news.json
          # Only commit if the news.json file actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update news.json" && git push)
